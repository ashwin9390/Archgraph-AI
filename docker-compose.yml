version: "3.9"

services:
  neo4j:
    image: neo4j:5.19-community
    environment:
      NEO4J_AUTH: neo4j/archgraph
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      retries: 10

  api:
    build: .
    command: uvicorn archgraph.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: archgraph
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

volumes:
  neo4j_data:
